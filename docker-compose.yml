services:
  trazabilidad:
    container_name: pragma-trazabilidad
    image: pragma-trazabilidad:0.0.1-SNAPSHOT
    build:
      context: .
      args:
        APP_VERSION: "0.0.1-SNAPSHOT"
    ports:
      - "8083:8083"
    environment:
      JWT_SECRET: pragma_super_secret_key_change_in_production
      MONGODB_URI: mongodb://pragma_user:pragma_pass@pragma-mongodb:27017/pragma_trazabilidad?authSource=pragma_trazabilidad
    networks:
      - pragma-net

networks:
  pragma-net:
    external: true

